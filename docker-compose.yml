services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: 'skc-Dan-Al123!@#'
      MYSQL_DATABASE: skull_king
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backEnd
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: 'skc-Dan-Al123!@#'
      DB_DATABASE: skull_king
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontEnd
    ports:
      - "80:80"
    depends_on:
      - backend

  test-runner:
    build: 
      context: .
      dockerfile: Dockerfile.test
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: 'skc-Dan-Al123!@#'
      DB_DATABASE: skull_king
      NODE_ENV: test
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started
    command: >
      sh -c "cd frontEnd && npm run e2e && npm test && cd ../backEnd && npm test"

volumes:
  db_data: